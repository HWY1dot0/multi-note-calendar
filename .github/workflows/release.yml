name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write # create the release and upload assets
  id-token: write # required for signing the build provenance attestation
  attestations: write # required to record the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Attest main.js and styles.css so the release assets carry a verifiable
      # GitHub artifact attestation (links each asset to this build run).
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title="$TAG" \
            --notes="Release $TAG" \
            --verify-tag \
            main.js manifest.json styles.css
